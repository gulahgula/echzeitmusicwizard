<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup-base.css">
  <link rel="stylesheet" href="popup-editorial.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-row">
        <div>
          <p class="eyebrow">Berlin experimental music calendar</p>
          <h1>echtzeit<span>musik</span></h1>
        </div>
      </div>
      <div class="filter-bar">
        <button data-filter="today" class="active" aria-label="Show today's concerts">today</button>
        <button data-filter="tomorrow" aria-label="Show tomorrow's concerts">tomorrow</button>
        <button data-filter="next7" aria-label="Show next 7 days">7 days</button>
        <button data-filter="month" aria-label="Show this month">month</button>
        <button data-filter="all" aria-label="Show all concerts">all</button>
        <button data-filter="notifications" class="notif-tab-btn" aria-label="Show notifications">🔔</button>
      </div>
      <div class="wizard-bar">
        <a href="#" id="open-analysis" class="wizard-btn"><span>Artist index</span> Explore the wider scene <b>→</b></a>
      </div>
    </header>
    <div id="content">
      <div id="loading">Loading concerts…</div>
      <div id="error" class="hidden"></div>
      <div id="overview"></div>
      <div id="event-list"></div>
    </div>
    <footer>
      <a href="#" id="open-about">About</a>
      <a href="https://buymeacoffee.com/gulahgula" target="_blank" rel="noopener" class="tip-link">Support the project ↗</a>
    </footer>
  </div>
  <script src="../shared/dictionaries.js"></script>
  <script src="../shared/extractor.js"></script>
  <script src="../shared/parser.js"></script>
  <script src="../shared/catalogue-db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
